name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ github.ref == 'refs/heads/main' && 'production' || 'development' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare environment files (pull request)
        if: github.event_name == 'pull_request'
        run: |
          cp src/environments/environment.ts.example src/environments/environment.ts
          cp src/environments/environment.staging.ts.example src/environments/environment.staging.ts

      - name: Build (development / pull request)
        if: github.event_name == 'pull_request'
        run: npm run build -- --configuration development

      - name: Prepare environment files (main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cp src/environments/environment.ts.example src/environments/environment.ts
          cp src/environments/environment.staging.ts.example src/environments/environment.staging.ts

      - name: Inject secrets
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_API_KEY: ${{ secrets.SHEETS_API_KEY }}
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
        run: |
          node -e "
            const fs = require('fs');
            let c = fs.readFileSync('src/environments/environment.production.ts', 'utf8');
            c = c.replace('REPLACE_ADMIN_PASSWORD', process.env.ADMIN_PASSWORD || '');
            c = c.replace('REPLACE_SHEETS_SPREADSHEET_ID', process.env.SHEETS_SPREADSHEET_ID || '');
            c = c.replace('REPLACE_SHEETS_API_KEY', process.env.SHEETS_API_KEY || '');
            c = c.replace('REPLACE_GAS_WEB_APP_URL', process.env.GAS_WEB_APP_URL || '');
            fs.writeFileSync('src/environments/environment.production.ts', c);
          "

      - name: Build (production / main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm run build:production

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/eleazmead/browser

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
