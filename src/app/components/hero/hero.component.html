<section class="hero" id="hero">
  <div class="hero__content">
    <div class="hero__names fade-in">
      <span class="hero__name">{{ config.couple.name1 }}</span>
      <span class="hero__ampersand">&amp;</span>
      <span class="hero__name">{{ config.couple.name2 }}</span>
    </div>

    <div class="hero__divider"></div>

    <p class="hero__headline fade-in fade-in--d1">{{ 'hero.headline' | translate }}</p>
    <p class="hero__subheadline fade-in fade-in--d2">{{ 'hero.subheadline' | translate }}</p>
    <p class="hero__meta fade-in fade-in--d3">
      {{ config.couple.weddingDate }}&ensp;&bull;&ensp;{{ config.couple.venue }}
    </p>
    <a href="#rsvp" class="hero__cta fade-in fade-in--d4">{{ 'hero.cta' | translate }}</a>
  </div>

  <svg class="hero__ornament" viewBox="0 0 200 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <line x1="0" y1="10" x2="80" y2="10" stroke="currentColor" stroke-width="0.5"/>
    <circle cx="100" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="0.5"/>
    <circle cx="100" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="0.5"/>
    <line x1="120" y1="10" x2="200" y2="10" stroke="currentColor" stroke-width="0.5"/>
  </svg>
</section>
