<section class="gallery" id="gallery">
  <div class="gallery__container">
    <h2 class="section-heading" appFadeUp>{{ 'gallery.heading' | translate }}</h2>

    @if (images().length > 0) {
      <div class="gallery__grid">
        @for (filename of images(); track filename; let i = $index) {
          <button
            class="gallery__tile"
            type="button"
            (click)="open(i)"
            [attr.aria-label]="'View photo ' + (i + 1)"
          >
            <img
              class="gallery__tile-img"
              [src]="imageUrl(filename)"
              [alt]="'Photo ' + (i + 1)"
              loading="lazy"
            />
          </button>
        }
      </div>
    } @else {
      <p class="gallery__empty">Photos coming soon.</p>
    }
  </div>

  @if (selectedIndex() !== null) {
    <div
      class="gallery__overlay"
      role="dialog"
      aria-modal="true"
      aria-label="Photo lightbox"
      (click)="close()"
    >
      <button class="gallery__overlay-close" type="button" (click)="close()" aria-label="Close">
        &#215;
      </button>
      <div class="gallery__overlay-content" (click)="stopPropagation($event)">
        <img
          class="gallery__overlay-img"
          [src]="imageUrl(images()[selectedIndex()!])"
          [alt]="'Photo ' + (selectedIndex()! + 1)"
        />
      </div>
    </div>
  }
</section>
